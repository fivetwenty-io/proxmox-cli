name: release

# Publish a GitHub Release with cross-platform binaries whenever a
# semver tag (v1.2.3) is pushed. GoReleaser builds the matrix, archives
# each target, generates SHA256SUMS, and uploads everything to the release.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # required to create the GitHub Release and upload assets

jobs:
  goreleaser:
    name: goreleaser
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history + tags for changelog generation

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.4"
          check-latest: true
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
