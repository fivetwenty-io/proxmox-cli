name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    name: check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.4"
          check-latest: true
          cache: true

      - name: gofmt
        run: |
          out="$(gofmt -l .)"; [ -z "$out" ] || { echo "unformatted:"; echo "$out"; exit 1; }

      - name: Vet
        run: go vet ./...

      - name: Unit tests
        run: go test ./...

      - name: Man generation smoke
        run: go run ./cmd/docgen -out "${RUNNER_TEMP}/man" -version dev -date 1970-01-01
